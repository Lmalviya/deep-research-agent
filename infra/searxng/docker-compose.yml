services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=MySearxNG
      - SEARXNG_REDIS_URL=redis://redis:6379/0
    networks:
      - infra-network
networks:
  infra-network:
    external: true
    name: infra-network