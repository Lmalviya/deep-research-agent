services:
  # ── Monitoring ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - infra-network

  # ── MCP Host Database (separate from LiteLLM's Postgres) ───────────────────
  mcp-postgres:
    image: postgres:16-alpine
    container_name: mcp-postgres
    env_file:
      - ../apps/backend/.env
    environment:
      POSTGRES_DB: mcp_host
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: backend_password
    volumes:
      - mcp_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d mcp_host"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
      image: redis:7-alpine
      container_name: redis
      restart: unless-stopped
      ports:
        - "6379:6379"
      command: >
        redis-server
        --appendonly yes
        --save 60 1000
        --loglevel warning
      volumes:
        - redis_data:/data
      networks:
        - infra-network
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
  redis_data:
  mcp_postgres_data:

networks:
  litellm-db-internal:    # 🛡️ New internal network
    driver: bridge
  infra-network:
    external: true
    name: infra-network