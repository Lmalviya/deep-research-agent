services:

  # ── Monitoring ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - infra-network

  # ── MCP Host Database (separate from LiteLLM's Postgres) ───────────────────
  mcp-postgres:
    image: postgres:16-alpine
    container_name: mcp-postgres
    env_file:
      - ../apps/backend/.env
    environment:
      POSTGRES_DB: mcp_host
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: backend_password
    volumes:
      - mcp_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d mcp_host"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Brain (Orchestration Service) ──────────────────────────────────────────
  brain:
    build:
      context: ../brain
      dockerfile: Dockerfile
    container_name: mcp-brain
    ports:
      - "8001:8001"
    networks:
      - infra-network
    env_file:
      - ../brain/.env
    environment:
      - LITELLM_BASE_URL=http://litellm-proxy:4000
    restart: unless-stopped

  # ── Backend (API Gateway + MCP Manager) ────────────────────────────────────
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: mcp-backend
    ports:
      - "8000:8000"
    networks:
      - infra-network
    environment:
      - BACKEND_DB_ENDPOINT=mcp-postgres
      - BACKEND_DB_USER=mcp_user
      - BACKEND_DB_PASSWORD=backend_password
      - BACKEND_DB_PORT=5432
      - BACKEND_DB_NAME=mcp_host
      - SECRET_KEY=Q1d6V2N4V0ZyQ0h4N2l4M1Q3a3F6bWQ2R0p0eW9pU1hJc1JvS0E9
      - BRAIN_URL=http://brain:8001
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      mcp-postgres:
        condition: service_healthy
      brain:
        condition: service_started
    restart: unless-stopped

  # ── UI (Next.js) ────────────────────────────────────────────────────────────
  ui:
    build:
      context: ../apps/ui
      dockerfile: Dockerfile
    container_name: mcp-ui
    ports:
      - "3000:3000"
    networks:
      - infra-network
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mcp_postgres_data:

networks:
  infra-network:
    external: true
    name: infra-network
